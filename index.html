<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Girl - Pure HTML5 Canvas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            overflow: hidden;
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 12px;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Canvas Setup
    canvas.width = 800;
    canvas.height = 1000;

    // Animation State
    let walkCycle = 0;
    const amplitude = 15; // Movement swing amplitude

    function drawAnimeGirl(x, y, scale, offset) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);

        // --- 1. SHADOW ---
        ctx.beginPath();
        ctx.ellipse(0, 480, 100, 20, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
        ctx.fill();

        // --- 2. LEFT LEG (Behind) ---
        ctx.save();
        ctx.translate(-30, 320);
        ctx.rotate(-0.15 + Math.sin(offset) * 0.1);
        // Thigh
        ctx.beginPath();
        ctx.moveTo(-15, 0);
        ctx.quadraticCurveTo(-10, 60, 0, 90);
        ctx.quadraticCurveTo(10, 60, 15, 0);
        ctx.closePath();
        ctx.fillStyle = "#fce4d6";
        ctx.fill();
        ctx.strokeStyle = "#e6c2a5";
        ctx.lineWidth = 1;
        ctx.stroke();
        // Calf
        ctx.beginPath();
        ctx.moveTo(-10, 80);
        ctx.quadraticCurveTo(-18, 120, -20, 160);
        ctx.quadraticCurveTo(18, 120, 10, 80);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        // --- 3. LEFT SHOE (Behind) ---
        ctx.save();
        ctx.translate(-45, 470);
        ctx.rotate(0.2 + Math.sin(offset + 1) * 0.1);
        // Sole
        ctx.beginPath();
        ctx.moveTo(-25, 0);
        ctx.quadraticCurveTo(-30, 15, -15, 25);
        ctx.quadraticCurveTo(15, 25, 25, 15);
        ctx.quadraticCurveTo(30, 0, 25, -5);
        ctx.closePath();
        ctx.fillStyle = "#2c3e50";
        ctx.fill();
        // Shoe lace area
        ctx.beginPath();
        ctx.ellipse(0, -8, 18, 12, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#ecf0f1";
        ctx.fill();
        // Laces
        for(let i=-10; i<=10; i+=5){
            ctx.beginPath();
            ctx.moveTo(i, -12);
            ctx.lineTo(i+3, -4);
            ctx.strokeStyle = "#7f8c8d";
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        ctx.restore();

        // --- 4. BODY & SKIN (TORSO) ---
        ctx.save();
        ctx.translate(0, 150);
        ctx.beginPath();
        ctx.moveTo(-40, 0);
        ctx.quadraticCurveTo(-35, 60, -45, 140);
        ctx.quadraticCurveTo(0, 160, 45, 140);
        ctx.quadraticCurveTo(35, 60, 40, 0);
        ctx.closePath();
        ctx.fillStyle = "#fce4d6";
        ctx.fill();
        ctx.strokeStyle = "#e6c2a5";
        ctx.lineWidth = 1;
        ctx.stroke();

        // --- 5. RIGHT ARM (Behind, due to angle) ---
        ctx.save();
        ctx.translate(35, 20);
        ctx.rotate(-0.3);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(25, 40, 30, 100);
        ctx.quadraticCurveTo(10, 110, 0, 80);
        ctx.closePath();
        ctx.fillStyle = "#fce4d6";
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        // --- 6. PINK SHIRT (Front) ---
        ctx.save();
        ctx.translate(0, 150);
        // Left side frill
        ctx.beginPath();
        ctx.moveTo(-40, 10);
        ctx.quadraticCurveTo(-60, 50, -55, 110);
        ctx.quadraticCurveTo(-30, 130, 0, 120);
        ctx.quadraticCurveTo(-15, 80, -40, 10);
        ctx.fillStyle = "#f8bbd0";
        ctx.fill();
        ctx.strokeStyle = "#f48fb1";
        ctx.lineWidth = 1;
        ctx.stroke();

        // Right side frill
        ctx.beginPath();
        ctx.moveTo(40, 10);
        ctx.quadraticCurveTo(60, 50, 55, 110);
        ctx.quadraticCurveTo(30, 130, 0, 120);
        ctx.quadraticCurveTo(15, 80, 40, 10);
        ctx.fillStyle = "#f48fb1"; // Darker for depth
        ctx.fill();
        ctx.stroke();

        // Shirt Front Panel
        ctx.beginPath();
        ctx.moveTo(-35, 5);
        ctx.quadraticCurveTo(-30, 60, -35, 100);
        ctx.quadraticCurveTo(0, 110, 35, 100);
        ctx.quadraticCurveTo(30, 60, 35, 5);
        ctx.closePath();
        ctx.fillStyle = "#f06292";
        ctx.fill();
        ctx.stroke();
        
        // Chest Bow
        ctx.beginPath();
        ctx.moveTo(0, 30);
        ctx.quadraticCurveTo(-30, 15, -25, 45);
        ctx.quadraticCurveTo(0, 40, 0, 30);
        ctx.fillStyle = "#e91e63";
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, 30);
        ctx.quadraticCurveTo(30, 15, 25, 45);
        ctx.quadraticCurveTo(0, 40, 0, 30);
        ctx.fill();
        ctx.restore();

        // --- 7. BELT & SHORTS ---
        ctx.save();
        ctx.translate(0, 270);
        // White Shorts
        ctx.beginPath();
        ctx.moveTo(-30, 0);
        ctx.quadraticCurveTo(-40, 30, -35, 45);
        ctx.quadraticCurveTo(-10, 55, 0, 50);
        ctx.quadraticCurveTo(10, 55, 35, 45);
        ctx.quadraticCurveTo(40, 30, 30, 0);
        ctx.closePath();
        ctx.fillStyle = "#ffffff";
        ctx.fill();
        ctx.strokeStyle = "#bdc3c7";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Frills on Shorts (Lace effect)
        for(let i=-25; i<=25; i+=8) {
            ctx.beginPath();
            ctx.arc(i, 46, 5, 0, Math.PI);
            ctx.fillStyle = "#ecf0f1";
            ctx.fill();
            ctx.stroke();
        }

        // Brown Belt
        ctx.beginPath();
        ctx.moveTo(-32, 5);
        ctx.lineTo(32, 5);
        ctx.strokeStyle = "#795548";
        ctx.lineWidth = 6;
        ctx.stroke();
        // Belt Buckle
        ctx.fillStyle = "#f1c40f";
        ctx.strokeStyle = "#d4ac0d";
        ctx.lineWidth = 2;
        ctx.fillRect(-10, 1, 20, 8);
        ctx.strokeRect(-10, 1, 20, 8);
        ctx.restore();

        // --- 8. RIGHT LEG (Front) ---
        ctx.save();
        ctx.translate(30, 320);
        ctx.rotate(0.15 - Math.sin(offset) * 0.1);
        // Thigh
        ctx.beginPath();
        ctx.moveTo(-15, 0);
        ctx.quadraticCurveTo(10, 60, 15, 90);
        ctx.quadraticCurveTo(-10, 60, -15, 0);
        ctx.closePath();
        ctx.fillStyle = "#fce4d6";
        ctx.fill();
        ctx.stroke();
        // Calf
        ctx.beginPath();
        ctx.moveTo(10, 80);
        ctx.quadraticCurveTo(25, 120, 20, 160);
        ctx.quadraticCurveTo(-15, 120, -10, 80);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        // --- 9. RIGHT SHOE (Front) ---
        ctx.save();
        ctx.translate(40, 470);
        ctx.rotate(-0.2 - Math.sin(offset + 1) * 0.1);
        ctx.beginPath();
        ctx.moveTo(15, 0);
        ctx.quadraticCurveTo(25, 15, 15, 25);
        ctx.quadraticCurveTo(-15, 25, -25, 15);
        ctx.quadraticCurveTo(-30, 0, -20, -5);
        ctx.closePath();
        ctx.fillStyle = "#2c3e50";
        ctx.fill();
        ctx.strokeStyle = "#1a252f";
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(0, -8, 18, 12, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#ecf0f1";
        ctx.fill();
        for(let i=-10; i<=10; i+=5){
            ctx.beginPath();
            ctx.moveTo(i, -12);
            ctx.lineTo(i+3, -4);
            ctx.strokeStyle = "#7f8c8d";
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        ctx.restore();

        // --- 10. HEAD & FACE ---
        ctx.save();
        ctx.translate(0, -50);
        // Neck
        ctx.beginPath();
        ctx.rect(-12, 170, 24, 25);
        ctx.fillStyle = "#fce4d6";
        ctx.fill();

        // Head Shape
        ctx.beginPath();
        ctx.moveTo(-40, 140);
        ctx.quadraticCurveTo(-55, 80, -30, 30);
        ctx.quadraticCurveTo(-20, 10, 0, 5);
        ctx.quadraticCurveTo(20, 10, 30, 30);
        ctx.quadraticCurveTo(55, 80, 40, 140);
        ctx.closePath();
        ctx.fillStyle = "#fce4d6";
        ctx.fill();
        ctx.strokeStyle = "#e6c2a5";
        ctx.stroke();

        // --- 11. EYES (Green) ---
        // Left Eye
        ctx.beginPath();
        ctx.ellipse(-17, 90, 12, 16, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff";
        ctx.fill();
        ctx.strokeStyle = "#3e2723";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Iris
        ctx.beginPath();
        ctx.ellipse(-17, 92, 8, 10, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#2e7d32"; // Dark Green
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-15, 89, 4, 6, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#81c784"; // Light Green
        ctx.fill();
        // Pupil
        ctx.beginPath();
        ctx.ellipse(-17, 95, 3, 4, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#1b1b1b";
        ctx.fill();
        // Eye shine
        ctx.beginPath();
        ctx.ellipse(-15, 87, 2, 3, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff";
        ctx.fill();

        // Right Eye
        ctx.beginPath();
        ctx.ellipse(17, 90, 12, 16, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff";
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(17, 92, 8, 10, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#2e7d32";
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(19, 89, 4, 6, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#81c784";
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(17, 95, 3, 4, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#1b1b1b";
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(19, 87, 2, 3, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff";
        ctx.fill();

        // --- 12. MOUTH & BLUSH ---
        ctx.beginPath();
        ctx.arc(0, 125, 5, 0, Math.PI);
        ctx.fillStyle = "#e57373";
        ctx.fill();
        
        // Blush
        ctx.beginPath();
        ctx.ellipse(-25, 110, 10, 5, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 138, 101, 0.4)";
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(25, 110, 10, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        // --- 13. HAIR (Complex Layering) ---
        // Back Hair (Behind head)
        ctx.beginPath();
        ctx.moveTo(-40, 140);
        ctx.quadraticCurveTo(-70, 200, -60, 280);
        ctx.quadraticCurveTo(-30, 300, -20, 250);
        ctx.quadraticCurveTo(-15, 200, -20, 150);
        ctx.closePath();
        ctx.fillStyle = "#d7a86e";
        ctx.fill();
        ctx.strokeStyle = "#b8956a";
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(40, 140);
        ctx.quadraticCurveTo(70, 200, 60, 280);
        ctx.quadraticCurveTo(30, 300, 20, 250);
        ctx.quadraticCurveTo(15, 200, 20, 150);
        ctx.closePath();
        ctx.fillStyle = "#d7a86e";
        ctx.fill();
        ctx.stroke();

        // Front Bangs
        ctx.beginPath();
        ctx.moveTo(-45, 20);
        ctx.quadraticCurveTo(-20, -5, -5, 30);
        ctx.quadraticCurveTo(-25, 40, -40, 50);
        ctx.closePath();
        ctx.fillStyle = "#e0b68b";
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(45, 20);
        ctx.quadraticCurveTo(20, -5, 5, 30);
        ctx.quadraticCurveTo(25, 40, 40, 50);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-20, 10);
        ctx.quadraticCurveTo(0, -10, 20, 10);
        ctx.quadraticCurveTo(0, 20, -20, 10);
        ctx.closePath();
        ctx.fillStyle = "#cda37a";
        ctx.fill();
        ctx.stroke();

        // Side Hair (Flowing)
        ctx.beginPath();
        ctx.moveTo(-30, 40);
        ctx.quadraticCurveTo(-50, 150, -80, 250);
        ctx.quadraticCurveTo(-60, 270, -40, 200);
        ctx.quadraticCurveTo(-20, 100, -15, 50);
        ctx.closePath();
        ctx.fillStyle = "#e0b68b";
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(30, 40);
        ctx.quadraticCurveTo(50, 150, 80, 250);
        ctx.quadraticCurveTo(60, 270, 40, 200);
        ctx.quadraticCurveTo(20, 100, 15, 50);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Ahoge (Cowlick on top)
        ctx.beginPath();
        ctx.moveTo(0, 5);
        ctx.quadraticCurveTo(15, -20, 30, -10);
        ctx.quadraticCurveTo(20, -5, 10, 10);
        ctx.closePath();
        ctx.fillStyle = "#e0b68b";
        ctx.fill();

        // --- 14. CHOKER ---
        ctx.beginPath();
        ctx.rect(-15, 180, 30, 5);
        ctx.fillStyle = "#3e2723";
        ctx.fill();

        ctx.restore(); // Pop head transform

        // --- 15. BELT STRAP HANGING (Effect from image) ---
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(30, 270);
        ctx.quadraticCurveTo(80, 290, 100, 340);
        ctx.quadraticCurveTo(110, 370, 90, 400);
        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 8;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-30, 270);
        ctx.quadraticCurveTo(-80, 290, -100, 340);
        ctx.quadraticCurveTo(-110, 370, -90, 400);
        ctx.stroke();
        ctx.restore();

        ctx.restore(); // Pop main transform
    }

    // --- ANIMATION LOOP ---
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Center point to draw
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2 - 50;

        // Animate the girl
        drawAnimeGirl(centerX, centerY, 1.0, walkCycle);

        // Increment cycle for smooth walking effect
        walkCycle += 0.05;

        requestAnimationFrame(animate);
    }

    // Start the animation
    animate();

</script>
</body>
</html>
