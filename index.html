<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Advanced Anime Canvas · Cyber Sakura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .frame {
            background: #12102a;
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px #3f3a6b inset;
        }
        canvas {
            display: block;
            width: 700px;
            height: 700px;
            border-radius: 2rem;
            background: radial-gradient(circle at 30% 40%, #1e1b3a, #0c0a1c);
            box-shadow: 0 0 30px #8a7bff44;
            transition: filter 0.2s;
            cursor: crosshair;
        }
        canvas:hover {
            filter: drop-shadow(0 0 18px #b7a6ff66);
        }
        .caption {
            text-align: center;
            margin-top: 1.2rem;
            color: #b6adf0;
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 0.9rem;
            text-transform: uppercase;
            background: #1d1a36;
            padding: 0.5rem 1.8rem;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(4px);
            border: 1px solid #4d4580;
            box-shadow: 0 0 20px #5f4fbb33;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="frame">
        <canvas id="animeCanvas" width="700" height="700"></canvas>
    </div>
    <div class="caption">✦ 霓 虹  ｜  心 魂  ｜  樱 华  ✦</div>
</div>
<script>
    (function() {
        const canvas = document.getElementById('animeCanvas');
        const ctx = canvas.getContext('2d');

        // ----------  advanced anime character ----------
        //  “Cyber Sakura” —  fusion of futuristic & traditional anime aesthetics
        function drawCharacter(time) {
            ctx.clearRect(0, 0, 700, 700);

            // ----  dynamic glint / floating energy ----
            const wave = Math.sin(time * 0.6) * 0.2 + 0.8;
            const glowPulse = Math.sin(time * 1.2) * 0.15 + 0.85;

            // ----------  layered background aura ----------
            const grad = ctx.createRadialGradient(350, 340, 20, 350, 340, 420);
            grad.addColorStop(0, `rgba(190, 150, 255, ${0.08 * wave})`);
            grad.addColorStop(0.5, `rgba(100, 70, 200, ${0.12 * glowPulse})`);
            grad.addColorStop(1, 'rgba(20, 10, 40, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 700, 700);

            // ----  floating particles (sakura / data) ----
            for (let i = 0; i < 28; i++) {
                const seed = i * 1.7;
                const x = 180 + Math.sin(time * 0.3 + i * 0.9) * 150 + Math.cos(i * 0.5) * 40;
                const y = 160 + Math.cos(time * 0.4 + i * 1.1) * 140 + Math.sin(i * 0.7) * 30;
                const size = 3 + Math.sin(time + i) * 2.5;
                const alpha = 0.25 + Math.sin(time * 0.7 + i) * 0.15;
                ctx.beginPath();
                ctx.arc(x, y, Math.abs(size * 0.5), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 180, 220, ${alpha * 0.7})`;
                ctx.shadowColor = '#ff96d0';
                ctx.shadowBlur = 18;
                ctx.fill();
                // tiny core
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(x-2, y-2, Math.abs(size * 0.2), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            // ----------  MAIN CHARACTER ----------
            // ---  hair base (flowing, layered) ---
            ctx.save();
            // large hair back
            ctx.shadowColor = '#9a7aff';
            ctx.shadowBlur = 40;
            ctx.beginPath();
            ctx.ellipse(350, 300, 160, 190, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#1f174a';
            ctx.fill();
            // hair shine / gradient
            const hairGrad = ctx.createLinearGradient(200, 150, 500, 450);
            hairGrad.addColorStop(0, '#3d2b7a');
            hairGrad.addColorStop(0.5, '#251d5a');
            hairGrad.addColorStop(1, '#120e2e');
            ctx.beginPath();
            ctx.ellipse(350, 300, 150, 180, 0, 0, Math.PI * 2);
            ctx.fillStyle = hairGrad;
            ctx.fill();

            // ---  dynamic hair strands (anime spikes) ---
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#b496ff';
            for (let i = 0; i < 14; i++) {
                const angle = i * 0.9 + time * 0.08;
                const rad = 140 + Math.sin(time * 0.5 + i) * 12;
                const x = 350 + Math.cos(angle) * rad * 0.6;
                const y = 280 + Math.sin(angle) * rad * 0.5;
                ctx.beginPath();
                ctx.moveTo(350 + Math.cos(angle-0.3) * 60, 280 + Math.sin(angle-0.3) * 50);
                ctx.quadraticCurveTo(x, y-20, 350 + Math.cos(angle+0.5) * 70, 280 + Math.sin(angle+0.5) * 55);
                ctx.strokeStyle = `rgba(180, 140, 255, ${0.5 + Math.sin(time + i)*0.15})`;
                ctx.lineWidth = 6 + Math.sin(time*0.7 + i)*2;
                ctx.stroke();
            }

            // ---  face base (柔らかい) ---
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#6f5bb0';
            ctx.beginPath();
            ctx.ellipse(350, 320, 72, 82, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#f8e6d8';
            ctx.fill();
            // cheek blush (dynamic)
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff9db0';
            ctx.beginPath();
            ctx.ellipse(310, 340, 18, 10, -0.2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 150, 170, ${0.25 + Math.sin(time*0.5)*0.08})`;
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(390, 340, 18, 10, 0.2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 150, 170, ${0.25 + Math.sin(time*0.5+0.8)*0.08})`;
            ctx.fill();

            // ---  eyes (expressive, large, anime) ---
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#80b0ff';
            // left eye white
            ctx.beginPath();
            ctx.ellipse(320, 305, 28, 32, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#fcfaff';
            ctx.fill();
            // right eye white
            ctx.beginPath();
            ctx.ellipse(380, 305, 28, 32, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#fcfaff';
            ctx.fill();

            // iris (gradient + glow)
            const irisColor1 = '#3f3199';
            const irisColor2 = '#6a4ed6';
            for (let side = 0; side < 2; side++) {
                const cx = side === 0 ? 320 : 380;
                const gradIris = ctx.createRadialGradient(cx-6, 296, 6, cx, 302, 26);
                gradIris.addColorStop(0, '#b096ff');
                gradIris.addColorStop(0.5, '#6244c9');
                gradIris.addColorStop(1, '#251b5a');
                ctx.beginPath();
                ctx.ellipse(cx, 302, 22, 26, 0, 0, Math.PI * 2);
                ctx.fillStyle = gradIris;
                ctx.fill();
                // pupil
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#beb0ff';
                ctx.beginPath();
                ctx.arc(cx-2, 304, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#09081a';
                ctx.fill();
                // eye shine (anime sparkle)
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ffffff';
                ctx.beginPath();
                ctx.arc(cx-10, 292, 6, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.8 + Math.sin(time*1.3)*0.1})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx+8, 298, 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(time*1.7+1)*0.15})`;
                ctx.fill();
            }

            // ---  eyebrows (expressive) ---
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#2d2155';
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#1f173a';
            ctx.beginPath();
            ctx.moveTo(295, 278);
            ctx.quadraticCurveTo(310, 266, 340, 274);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(360, 274);
            ctx.quadraticCurveTo(390, 266, 405, 278);
            ctx.stroke();

            // ---  nose + mouth (delicate) ---
            ctx.shadowBlur = 5;
            ctx.strokeStyle = '#cfa5b0';
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.moveTo(350, 334);
            ctx.quadraticCurveTo(346, 344, 350, 350);
            ctx.stroke();
            // mouth
            ctx.beginPath();
            ctx.arc(350, 368, 10, 0.1, Math.PI - 0.1);
            ctx.strokeStyle = '#b05870';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // ---  outfit / collar (cyber accents) ---
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#4a3a86';
            ctx.beginPath();
            ctx.moveTo(280, 400);
            ctx.lineTo(350, 440);
            ctx.lineTo(420, 400);
            ctx.fillStyle = '#19163a';
            ctx.fill();
            // glowing neckline
            ctx.shadowColor = '#b29eff';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.moveTo(285, 402);
            ctx.lineTo(350, 438);
            ctx.lineTo(415, 402);
            ctx.strokeStyle = `rgba(170, 140, 255, ${0.5 + Math.sin(time*0.5)*0.2})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // ---  floating hair accessories (anime ribbons) ---
            for (let i = 0; i < 2; i++) {
                const xOff = i === 0 ? -80 : 80;
                const baseX = 350 + xOff;
                const baseY = 200 + Math.sin(time * 0.9 + i * 2) * 12;
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#d9b0ff';
                ctx.beginPath();
                ctx.moveTo(baseX-12, baseY-6);
                ctx.quadraticCurveTo(baseX-28, baseY-30, baseX-8, baseY-40);
                ctx.fillStyle = `rgba(200, 160, 255, ${0.6 + Math.sin(time + i)*0.2})`;
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(baseX+12, baseY-6);
                ctx.quadraticCurveTo(baseX+28, baseY-30, baseX+8, baseY-40);
                ctx.fillStyle = `rgba(200, 160, 255, ${0.6 + Math.cos(time + i)*0.2})`;
                ctx.fill();
            }

            // ----  floating runes / アニメ energy  ----
            ctx.shadowBlur = 35;
            ctx.shadowColor = '#ae8eff';
            ctx.font = 'bold 18px "Segoe UI", "Arial Unicode MS", sans-serif';
            ctx.fillStyle = `rgba(210, 190, 255, ${0.3 + Math.sin(time*0.9)*0.15})`;
            ctx.fillText('✦ 魂 ✦', 290, 130 + Math.sin(time*0.6)*8);
            ctx.font = '14px sans-serif';
            ctx.fillStyle = `rgba(180, 160, 255, ${0.25 + Math.sin(time*0.7+1)*0.1})`;
            ctx.fillText('⚡ サイバー ⚡', 490, 560 + Math.sin(time*0.5)*6);

            // ---  final glow overlay (extra aura) ---
            ctx.shadowBlur = 100;
            ctx.shadowColor = '#7760cf';
            ctx.beginPath();
            ctx.arc(350, 280, 150, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(80, 50, 150, 0.03)';
            ctx.fill();

            ctx.restore();

            // ---  shimmering "anime tears" / stardust (dynamic) ---
            for (let i = 0; i < 8; i++) {
                const t = time * 0.5 + i * 1.2;
                const x = 280 + Math.sin(t) * 100 + Math.cos(i * 0.9) * 30;
                const y = 220 + Math.cos(t * 0.7) * 100 + Math.sin(i * 0.8) * 25;
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ffb0e0';
                ctx.beginPath();
                ctx.arc(x, y, 2.5 + Math.sin(t+3)*1.2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 200, 240, ${0.25 + Math.sin(t+1)*0.1})`;
                ctx.fill();
            }

            // small eye catch (extra twinkle)
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#ffffff';
            ctx.beginPath();
            ctx.arc(340, 270, 3, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + Math.sin(time*1.8)*0.15})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(370, 272, 2, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 255, 255, ${0.25 + Math.cos(time*1.4)*0.15})`;
            ctx.fill();

            // final frame signature
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#6a5aa0';
            ctx.fillStyle = '#b3a3dd';
            ctx.font = '12px monospace';
            ctx.fillText('✦ cyber sakura ✦', 540, 670);
        }

        // animation loop
        let startTime = performance.now() / 1000;
        function animate() {
            const now = performance.now() / 1000;
            const elapsed = (now - startTime) * 0.7;  // speed
            drawCharacter(elapsed);
            requestAnimationFrame(animate);
        }
        animate();

        // optional resize / crispness (fixed size)
        // keep crisp
    })();
</script>
</body>
</html>
