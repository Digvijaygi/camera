<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Happy Birthday · Future & Funny</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(6px);
            border-radius: 56px 56px 40px 40px;
            padding: 28px 28px 40px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 0, 0.15);
            max-width: 820px;
            width: 100%;
            transition: all 0.2s ease;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 800 / 450;
            border-radius: 40px;
            box-shadow: inset 0 0 40px rgba(255, 200, 50, 0.3), 0 20px 35px rgba(0,0,0,0.6);
            background: #0f1422;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="28" viewBox="0 0 24 28"><circle cx="12" cy="12" r="10" fill="%23ffd966" opacity="0.7"/><circle cx="12" cy="12" r="6" fill="%23ffb82e"/><path d="M12 4 L14 10 L20 12 L14 14 L12 20 L10 14 L4 12 L10 10 Z" fill="%23ffecb0"/></svg>') 12 12, auto;
            transition: box-shadow 0.3s;
        }
        canvas:hover {
            box-shadow: inset 0 0 60px rgba(255, 215, 0, 0.5), 0 20px 40px #000000aa;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding: 0 12px 0 20px;
            flex-wrap: wrap;
            gap: 16px 12px;
        }
        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .btn {
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffe9b6;
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: rgba(20, 25, 50, 0.7);
        }
        .btn:hover {
            background: #f5c542;
            color: #121624;
            border-color: #ffde7a;
            transform: scale(1.02);
            box-shadow: 0 8px 20px #f5b81b55;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-emoji {
            font-size: 1.3rem;
            line-height: 1;
        }
        .wish-text {
            color: #ffecce;
            font-size: 1.5rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 22px;
            border-radius: 60px;
            backdrop-filter: blur(6px);
            border: 1px solid #ffd96666;
            text-shadow: 0 0 16px #ffbb33;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .wish-text span {
            font-size: 1.9rem;
        }
        @media (max-width: 550px) {
            .card { padding: 16px; }
            .footer { flex-direction: column; align-items: stretch; }
            .wish-text { justify-content: center; font-size: 1.2rem; }
            .btn-group { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="card">
    <!-- Canvas: where the magic happens -->
    <canvas id="birthdayCanvas" width="800" height="450"></canvas>

    <div class="footer">
        <div class="wish-text">
            <span>🎂</span> Future & Funny <span>🤖</span>
        </div>
        <div class="btn-group">
            <button class="btn" id="confettiBtn"><span class="btn-emoji">🎊</span> Confetti</button>
            <button class="btn" id="resetBtn"><span class="btn-emoji">🔄</span> Reset</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('birthdayCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- dimensions ----------
        const W = 800, H = 450;
        canvas.width = W; canvas.height = H;

        // ---------- state ----------
        let particles = [];
        let textParticles = [];
        let time = 0;
        let animationFrame = null;
        let isConfettiMode = false;    // true → confetti burst, false → happy birthday & funny

        // ---------- helper: random range ----------
        const rand = (min, max) => Math.random() * (max - min) + min;
        const randInt = (min, max) => Math.floor(rand(min, max + 1));

        // ---------- colors ----------
        const palette = [
            '#FF6B6B', '#FFB84C', '#F9E75C', '#4ECB71', '#4D96FF', 
            '#9B59B6', '#FF8A9B', '#00D2FF', '#FFD93D', '#FF8A5C',
            '#A8E6CF', '#D4A5FF', '#FFADAD', '#B5EAD7'
        ];

        // ---------- create a single particle (confetti or text) ----------
        function createParticle(x, y, type = 'confetti') {
            const isText = type === 'text';
            const size = isText ? rand(18, 44) : rand(10, 26);
            const color = palette[randInt(0, palette.length - 1)];
            const angle = rand(0, Math.PI * 2);
            const speed = isText ? rand(1.2, 3.0) : rand(1.8, 5.5);
            const vx = Math.cos(angle) * speed * (isText ? 0.8 : 1.2);
            const vy = Math.sin(angle) * speed * (isText ? 0.8 : 1.2) - (isText ? 0.5 : 1.0);
            return {
                x, y,
                vx, vy,
                size,
                color,
                life: 1.0,
                decay: isText ? rand(0.004, 0.015) : rand(0.006, 0.025),
                rotation: rand(0, Math.PI * 2),
                rotSpeed: rand(-0.08, 0.08),
                type: type,          // 'confetti' or 'text'
                textChar: isText ? ['🎉','🥳','✨','🎈','🎁','🤖','🚀','🔥','💫','😎','❤️','⭐','🌈','🎂'][randInt(0,13)] : '',
                gravity: isText ? 0.06 : 0.10,
                wobble: rand(0, 10),
            };
        }

        // ---------- generate "Happy Birthday" text particles (future & funny) ----------
        function generateTextParticles() {
            const newParticles = [];
            const messages = ['✨ FUTURE', '&', 'FUNNY', '🎉', 'HAPPY', 'BIRTHDAY', '🎂'];
            // position them in a curve / spread
            const baseY = H * 0.48;
            const spread = 460;
            const startX = (W - spread) / 2;
            for (let i = 0; i < messages.length; i++) {
                const word = messages[i];
                // each word gets 2~6 particles
                const count = word.length > 2 ? randInt(6, 14) : randInt(4, 10);
                for (let j = 0; j < count; j++) {
                    const xOffset = (i / (messages.length - 1)) * spread + rand(-18, 18);
                    const yOffset = rand(-35, 35) + (i % 2 === 0 ? rand(-10, 10) : rand(-5, 15));
                    const p = createParticle(
                        startX + xOffset + rand(-12, 12),
                        baseY + yOffset + rand(-10, 10),
                        'text'
                    );
                    // override char with actual character from word (randomly pick)
                    const chars = word.split('');
                    p.textChar = chars[randInt(0, chars.length - 1)];
                    if (p.textChar === ' ') p.textChar = '•';
                    p.size = rand(20, 44);
                    p.color = ['#FFD966', '#FFB347', '#FF6B6B', '#6BCB77', '#4D96FF', '#FF8A9B', '#D4A5FF', '#FFD93D'][randInt(0,7)];
                    newParticles.push(p);
                }
            }
            // extra funny particles around
            for (let i=0; i<30; i++) {
                const p = createParticle(rand(50, W-50), rand(40, H-40), 'text');
                p.textChar = ['😜','🤪','🥳','🎈','💥','🔥','⭐','🚀','💫','🌈','🎁','🪄','✨','🤖','👾','🦄','🍕','🎂'][randInt(0,17)];
                p.size = rand(18, 38);
                p.color = palette[randInt(0, palette.length-1)];
                p.vx = rand(-1.8, 1.8);
                p.vy = rand(-2.2, 0.5);
                p.decay = rand(0.005, 0.02);
                p.life = 1.0;
                newParticles.push(p);
            }
            return newParticles;
        }

        // ---------- confetti burst ----------
        function generateConfetti(count = 240) {
            const newParticles = [];
            const cx = W/2, cy = H/2 - 30;
            for (let i = 0; i < count; i++) {
                const angle = rand(0, Math.PI * 2);
                const speed = rand(4, 14);
                const p = createParticle(
                    cx + rand(-40, 40),
                    cy + rand(-30, 30),
                    'confetti'
                );
                p.vx = Math.cos(angle) * speed * rand(0.6, 1.4);
                p.vy = Math.sin(angle) * speed * rand(0.6, 1.4) - rand(1, 3);
                p.size = rand(8, 22);
                p.color = palette[randInt(0, palette.length - 1)];
                p.decay = rand(0.004, 0.018);
                p.gravity = rand(0.04, 0.14);
                p.life = 1.0;
                newParticles.push(p);
            }
            return newParticles;
        }

        // ---------- reset scene (happy birthday + funny) ----------
        function resetToBirthday() {
            isConfettiMode = false;
            particles = [];
            textParticles = generateTextParticles();
            // also add some floating background sparkles
            for (let i=0; i<40; i++) {
                const p = createParticle(rand(20, W-20), rand(20, H-20), 'confetti');
                p.size = rand(4, 12);
                p.vx = rand(-0.3, 0.3);
                p.vy = rand(-0.2, -0.8);
                p.decay = 0.002;
                p.life = 1.0;
                p.color = palette[randInt(0, palette.length-1)];
                p.gravity = -0.02;
                p.type = 'bgSparkle';
                particles.push(p);
            }
        }

        // ---------- trigger confetti ----------
        function fireConfetti() {
            isConfettiMode = true;
            // replace particles with fresh confetti, keep a few text remainders (or not)
            const confetti = generateConfetti(280);
            particles = confetti;
            textParticles = [];   // clear text particles for confetti focus
        }

        // ---------- drawing & update ----------
        function updateAndDraw() {
            time += 0.01;

            // clear canvas with a subtle gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#141b33');
            gradient.addColorStop(0.6, '#1d2340');
            gradient.addColorStop(1, '#101624');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            // draw subtle grid/starfield
            ctx.shadowBlur = 0;
            for (let i=0; i<30; i++) {
                ctx.beginPath();
                ctx.arc((i*37 + 13) % W, (i*23 + 47) % H, 1.2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 215, 0, ${0.08+Math.sin(time+i)*0.04})`;
                ctx.fill();
            }

            // update & draw particles (confetti + text)
            // merge: if confetti mode, only particles; else textParticles + some sparkles
            let allParticles = [];
            if (isConfettiMode) {
                allParticles = particles;
            } else {
                allParticles = [...textParticles, ...particles];
            }

            // update and filter dead
            const alive = [];
            for (let p of allParticles) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity || 0.06;
                p.vx *= 0.995;
                p.vy *= 0.995;
                p.life -= p.decay || 0.008;
                p.rotation += p.rotSpeed || 0.02;
                // wobble for fun
                if (p.wobble !== undefined) {
                    p.x += Math.sin(time * 2 + p.wobble) * 0.08;
                }

                // boundary bounce (soft)
                if (p.x < 0) { p.x = 0; p.vx *= -0.3; }
                if (p.x > W) { p.x = W; p.vx *= -0.3; }
                if (p.y < 0) { p.y = 0; p.vy *= -0.2; }
                if (p.y > H) { p.y = H; p.vy *= -0.5; p.life -= 0.02; }

                if (p.life > 0.02) alive.push(p);
            }

            // reassign
            if (isConfettiMode) {
                particles = alive;
            } else {
                // separate textParticles & particles (sparkles)
                const newText = [];
                const newSpark = [];
                for (let p of alive) {
                    if (p.type === 'text' || p.textChar) newText.push(p);
                    else newSpark.push(p);
                }
                textParticles = newText;
                particles = newSpark;
            }

            // ----- draw all particles -----
            for (let p of alive) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation || 0);
                const alpha = Math.min(p.life, 1.0);
                ctx.globalAlpha = alpha;

                if (p.type === 'text' || p.textChar) {
                    // draw emoji / char
                    ctx.font = `${p.size}px "Segoe UI Emoji", "Apple Color Emoji", system-ui, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(255,200,50,0.5)';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = p.color || '#FFD966';
                    ctx.fillText(p.textChar || '✨', 0, 0);
                } else {
                    // confetti: rectangle or circle
                    ctx.shadowColor = 'rgba(255,215,0,0.3)';
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = p.color || '#FFB84C';
                    const s = p.size * 0.7;
                    if (Math.random() > 0.4) {
                        ctx.fillRect(-s/2, -s/3, s, s*0.6);
                    } else {
                        ctx.beginPath();
                        ctx.arc(0, 0, s/2.2, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }

            // ----- extra "Future & Funny" message on top (when not confetti) -----
            if (!isConfettiMode) {
                ctx.save();
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#f5c54255';
                ctx.font = 'bold 32px "Segoe UI", "Poppins", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                const grad = ctx.createLinearGradient(100, 50, 700, 100);
                grad.addColorStop(0, '#FFD966');
                grad.addColorStop(0.5, '#FFB347');
                grad.addColorStop(1, '#FF8A5C');
                ctx.fillStyle = grad;
                ctx.fillText('✨ FUNNY & FUTURE ✨', W/2, 70);

                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.fillStyle = '#ffe9b6';
                ctx.shadowBlur = 16;
                ctx.fillText('🎂 HAPPY BIRTHDAY 🎂', W/2, 110);
                ctx.restore();
            } else {
                // confetti mode: show big message
                ctx.save();
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#ffb82e';
                ctx.font = 'bold 56px "Segoe UI", "Poppins", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#FFE484';
                ctx.shadowColor = '#f59f00';
                ctx.fillText('🎉 HAPPY BIRTHDAY! 🎉', W/2, 70);
                ctx.font = 'bold 28px sans-serif';
                ctx.fillStyle = '#fff0d0';
                ctx.fillText('🤖 future & funny 🚀', W/2, 130);
                ctx.restore();
            }

            // if confetti mode and particles are dying, after few seconds reset? (optional)
            if (isConfettiMode && alive.length < 40) {
                // auto reset to birthday after confetti fades
                resetToBirthday();
            }

            animationFrame = requestAnimationFrame(updateAndDraw);
        }

        // ---------- start animation ----------
        function init() {
            resetToBirthday();
            if (animationFrame) cancelAnimationFrame(animationFrame);
            updateAndDraw();
        }

        // ---------- event listeners ----------
        document.getElementById('confettiBtn').addEventListener('click', () => {
            fireConfetti();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            resetToBirthday();
        });

        // start
        init();

        // cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (animationFrame) cancelAnimationFrame(animationFrame);
        });
    })();
</script>
</body>
</html>
