<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>💖 AI Love Gesture Studio Pro</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0015;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border-glow: rgba(255, 100, 150, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 200, 230, 0.7);
            --gradient-1: #ff6b9d;
            --gradient-2: #ff2d75;
            --shadow-color: rgba(255, 0, 150, 0.15);
            --theme-toggle: #ff6b9d;
        }

        [data-theme="light"] {
            --bg-primary: #fff5f8;
            --bg-card: rgba(255, 200, 220, 0.15);
            --border-glow: rgba(255, 50, 100, 0.2);
            --text-primary: #1a0011;
            --text-secondary: rgba(80, 20, 50, 0.7);
            --shadow-color: rgba(255, 0, 100, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 12px;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-particles span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(255, 100, 150, 0.1), transparent);
            border-radius: 50%;
            animation: floatBg 20s infinite linear;
        }

        @keyframes floatBg {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* ===== MAIN CONTAINER ===== */
        .app-container {
            max-width: 780px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-left h1 {
            font-size: clamp(1.4rem, 4vw, 2rem);
            background: linear-gradient(45deg, var(--gradient-1), var(--gradient-2), var(--gradient-1));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            font-weight: 700;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .header-actions button {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-actions button:hover {
            transform: scale(1.05);
            background: rgba(255, 100, 150, 0.15);
            box-shadow: 0 0 20px rgba(255, 100, 150, 0.2);
        }

        /* ===== CAMERA CARD ===== */
        .camera-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 14px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 80px var(--shadow-color);
            position: relative;
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0d0015;
            aspect-ratio: 4/3;
            min-height: 250px;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }

        /* Camera Overlays */
        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .live-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255, 0, 50, 0.85);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 50, 100, 0.3);
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #ff0040;
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
        }

        .gesture-overlay {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 90%;
            text-align: center;
        }

        .gesture-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            padding: 10px 24px;
            border-radius: 60px;
            border: 1px solid rgba(255, 200, 220, 0.15);
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 600;
            color: #fff;
            min-width: 100px;
            white-space: nowrap;
        }

        .gesture-badge .g-emoji { margin-right: 8px; }

        /* Accuracy Ring */
        .accuracy-ring {
            position: absolute;
            bottom: 80px;
            right: 16px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #ff6b9d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #ff6b9d;
            flex-direction: column;
            line-height: 1.1;
        }
        .accuracy-ring small {
            font-size: 0.45rem;
            font-weight: 300;
            opacity: 0.7;
        }

        /* ===== LOVE METER ===== */
        .love-meter {
            margin-top: 14px;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .meter-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            min-width: 80px;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b9d, #ff2d75, #ff6b9d);
            background-size: 200% 100%;
            animation: gradientShift 2s ease-in-out infinite;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .meter-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== LOVE MESSAGE ===== */
        .message-box {
            margin-top: 14px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 18px 16px;
            border: 1px solid var(--border-glow);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #loveText {
            font-size: clamp(1.3rem, 3.5vw, 2rem);
            font-weight: 500;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #loveText .msg-emoji {
            font-size: clamp(2rem, 5vw, 3rem);
            animation: floatEmoji 3s ease-in-out infinite;
        }

        @keyframes floatEmoji {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-6px) scale(1.05); }
        }

        #loveText .msg-text {
            background: linear-gradient(45deg, #ff99bb, #ff6b9d, #ff99bb);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
        }

        .message-timestamp {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: 6px;
            opacity: 0.5;
            letter-spacing: 0.5px;
        }

        /* ===== STATS ROW ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 10px 8px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-card .stat-number {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ff6b9d;
        }

        .stat-card .stat-label {
            font-size: 0.55rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== GESTURE GRID ===== */
        .gesture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 6px;
            margin-top: 12px;
            padding: 10px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-glow);
        }

        .gesture-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 4px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            cursor: default;
            opacity: 0.5;
        }

        .gesture-item.active {
            opacity: 1;
            background: rgba(255, 100, 150, 0.12);
            box-shadow: 0 0 20px rgba(255, 100, 150, 0.05);
        }

        .gesture-item .gi-emoji { font-size: 1.6rem; }
        .gesture-item .gi-label { font-size: 0.5rem; color: var(--text-secondary); margin-top: 2px; }

        /* ===== ACTION BUTTONS ===== */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 6px;
            margin-top: 12px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            padding: 10px 6px;
            border-radius: 14px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            backdrop-filter: blur(10px);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 100, 150, 0.12);
            box-shadow: 0 4px 15px rgba(255, 100, 150, 0.15);
        }

        .action-btn .ab-emoji { font-size: 1.4rem; }
        .action-btn .ab-label { font-size: 0.5rem; opacity: 0.7; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 100, 150, 0.2);
            color: white;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .header { flex-direction: column; align-items: stretch; }
            .header-actions { justify-content: center; }
            .header-actions button { font-size: 0.65rem; padding: 4px 10px; }
            .gesture-badge { font-size: 0.9rem; padding: 6px 16px; min-width: 80px; }
            .accuracy-ring { width: 40px; height: 40px; font-size: 0.6rem; bottom: 70px; right: 10px; }
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .gesture-grid { grid-template-columns: repeat(5, 1fr); }
            .action-buttons { grid-template-columns: repeat(4, 1fr); }
            .video-wrapper { aspect-ratio: 4/3; min-height: 180px; }
        }

        @media (max-width: 380px) {
            .gesture-grid { grid-template-columns: repeat(4, 1fr); }
            .action-buttons { grid-template-columns: repeat(3, 1fr); }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ff6b9d; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="bg-particles" id="bgParticles"></div>

    <!-- Toast Notification -->

    <!-- Main App -->
    <div class="app-container">

        <div class="header">
            <div class="header-left">

            <div class="gesture-item" data-gesture="heart"><span class="gi-emoji">❤️</span><span class="gi-label">Heart</span></div>

        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="action-btn" onclick="captureScreenshot()">
                <span class="ab-emoji">📸</span>

                <span class="ab-emoji">💌</span>

                <span class="ab-emoji">🎵</span>

            <button class="action-btn" onclick="showLoveQuiz()">

            <button class="action-btn" onclick="clearHistory()">
                <span class="ab-emoji">🧹</span>

        </div>
    </div>

    <script>
        // ========================================
        // ===== COMPLETE FEATURE IMPLEMENTATION =====
        // ========================================

        // ===== 1. DATABASE: 40+ Love Messages with Emojis =====

        const FALLBACK_MSGS = [
            { emoji: '💖', msg: 'you are my everything' },
            { emoji: '💕', msg: 'you + me = infinite' },

            { emoji: '❤️‍🔥', msg: 'i choose you, always' }
        ];

        // ===== 2. QUOTES COLLECTION =====
        const QUOTES = [
            "Love is not about how many days, but how much.",
            "You are the reason my heart beats.",

            "You are my today and all of my tomorrows.",

            "The best thing to hold onto in life is each other.",
            "You are the answer to every prayer."
        ];

        // ===== 3. STATE MANAGEMENT =====
        const state = {
            gestureCount: 0,
            loveStreak: 0,
            loveNotes: 0,
            todayQuotes: 0,
            loveScore: 0,
            lastGesture: 'none',
            isSoundOn: true,
            isMusicOn: false,
            theme: 'dark',
            frameSkip: 0,
            history: [],
            accuracy: 0,
            streakTimer: null
        };

        // ===== 4. DOM REFS =====
        const video = document.getElementById('video');
        const loveTextEl = document.getElementById('loveText');
        const gestureBadgeEl = document.getElementById('gestureBadge');
        const gestureNameEl = document.getElementById('gestureName');
        const loveMeter = document.getElementById('loveMeter');
        const loveScoreText = document.getElementById('loveScoreText');
        const gestureCountEl = document.getElementById('gestureCount');
        const loveStreakEl = document.getElementById('loveStreak');
        const loveNotesEl = document.getElementById('loveNotes');
        const todayQuotesEl = document.getElementById('todayQuotes');
        const accuracyRing = document.getElementById('accuracyRing');
        const toast = document.getElementById('toast');
        const timestamp = document.getElementById('timestamp');

        // ===== 5. TOAST SYSTEM =====
        let toastTimeout = null;

        function showToast(msg, duration = 2500) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ===== 6. THEME TOGGLE =====
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
            state.theme = current === 'light' ? 'dark' : 'light';
            showToast(current === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode');
        }

        // ===== 7. SOUND TOGGLE =====
        function toggleSound() {
            state.isSoundOn = !state.isSoundOn;
            showToast(state.isSoundOn ? '🔊 Sound ON' : '🔇 Sound OFF');
        }

        // ===== 8. MUSIC TOGGLE =====
        function toggleMusic() {
            state.isMusicOn = !state.isMusicOn;
            document.getElementById('musicLabel').textContent = state.isMusicOn ? '⏸️' : '🎵';
            showToast(state.isMusicOn ? '🎵 Music ON' : '⏸️ Music OFF');
            if (state.isMusicOn) playMusic();
            else stopMusic();
        }

        // ===== 9. SIMPLE MUSIC (Web Audio) =====
        let audioCtx = null;
        let musicInterval = null;

        function playMusic() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let note = 0;
                musicInterval = setInterval(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = [523, 659, 784, 1047][note % 4];
                    gain.gain.value = 0.05;
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                    note++;
                }, 300);
            } catch (e) { console.log('Audio not supported'); }
        }

        function stopMusic() {
            if (musicInterval) clearInterval(musicInterval);
            if (audioCtx) audioCtx.close();
        }

        // ===== 10. TUTORIAL =====
        function showTutorial() {
            const gestures = Object.entries(LOVE_DB).map(([k, v]) => `${v.badge}`).join('\n');
            showToast(`🫶 Gestures:\n${gestures}\n\n📸 Screenshot · 💌 Love Letter · 🧠 Quiz`);
        }

        // ===== 11. RESET =====
        function resetAll() {
            state.gestureCount = 0;
            state.loveStreak = 0;
            state.loveNotes = 0;
            state.todayQuotes = 0;
            state.loveScore = 0;
            state.history = [];
            updateStats();
            showToast('🔄 Reset Complete!');
        }

        // ===== 12. SCREENSHOT =====
        function captureScreenshot() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const link = document.createElement('a');
            link.download = `love-gesture-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('📸 Screenshot Saved!');
        }

        // ===== 13. SHARE LOVE =====
        function shareLove() {
            const text = document.getElementById('loveText').textContent;
            const shareData = { title: '💖 Love Gesture', text: text, url: window.location.href };
            if (navigator.share) {
                navigator.share(shareData).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('📤 Copied to clipboard!');
                });
            }
        }

        // ===== 14. LOVE LETTER GENERATOR =====
        function generateLoveLetter() {
            const msgs = FALLBACK_MSGS;
            const random = msgs[Math.floor(Math.random() * msgs.length)];
            const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            const letter = `💌 My Dearest,\n\n${random.msg}. ${quote}\n\nWith all my love, ❤️\n- Your forever`;
            showToast(`💌 Love Letter Generated!`);
            loveTextEl.innerHTML = `
                <span class="msg-emoji">💌</span>
                <span class="msg-text">${random.msg} · ${quote}</span>
            `;
            state.loveNotes++;
            updateStats();
        }

        // ===== 15. LOVE QUIZ =====
        function showLoveQuiz() {
            const qs = [
                "❤️ What is the symbol of love?",
                "💕 What does 'ILY' stand for?",
                "✨ What makes love special?"
            ];
            const ans = ["Heart", "I Love You", "Everything"];
            const idx = Math.floor(Math.random() * qs.length);
            showToast(`🧠 Quiz: ${qs[idx]} (Answer: ${ans[idx]})`);
            state.todayQuotes++;
            updateStats();
        }

        // ===== 16. CLEAR HISTORY =====
        function clearHistory() {
            state.history = [];
            showToast('🧹 History Cleared!');
        }

        // ===== 17. UPDATE STATS =====
        function updateStats() {
            gestureCountEl.textContent = state.gestureCount;
            loveStreakEl.textContent = state.loveStreak;
            loveNotesEl.textContent = state.loveNotes;
            todayQuotesEl.textContent = state.todayQuotes;
            loveMeter.style.width = Math.min(state.loveScore, 100) + '%';
            loveScoreText.textContent = Math.min(Math.round(state.loveScore), 100) + '%';
            accuracyRing.innerHTML = `${Math.min(Math.round(state.accuracy), 100)}<small>%</small>`;
        }

        // ===== 18. UPDATE LOVE DISPLAY =====
        function updateLove(gesture) {
            let data;
            let isFallback = false;

            if (gesture !== 'none' && LOVE_DB[gesture]) {
                data = LOVE_DB[gesture];
                state.gestureCount++;
                state.loveScore = Math.min(state.loveScore + 2, 100);
                state.loveStreak++;
                state.accuracy = Math.min(state.accuracy + 3, 100);
            } else {
                const random = FALLBACK_MSGS[Math.floor(Math.random() * FALLBACK_MSGS.length)];
                data = { emoji: random.emoji, msg: random.msg, badge: '💕 Love' };
                isFallback = true;
                state.loveStreak = 0;
                state.accuracy = Math.max(state.accuracy - 2, 0);
            }

            // Update message
            loveTextEl.innerHTML = `
                <span class="msg-emoji">${data.emoji}</span>
                <span class="msg-text">${data.msg}</span>
            `;

            // Update badge
            if (!isFallback && LOVE_DB[gesture]) {
                const parts = data.badge.split(' ');
                gestureBadgeEl.innerHTML = `
                    <span class="g-emoji">${parts[0]}</span>
                    <span id="gestureName">${parts.slice(1).join(' ')}</span>
                `;
            } else {
                gestureBadgeEl.innerHTML = `
                    <span class="g-emoji">💕</span>
                    <span id="gestureName">${data.badge}</span>
                `;
            }

            // Update timestamp
            const now = new Date();
            timestamp.textContent = `❤️ ${now.toLocaleTimeString()} · ${now.toLocaleDateString()}`;

            // Update gesture grid
            document.querySelectorAll('.gesture-item').forEach(el => {
                el.classList.toggle('active', el.dataset.gesture === gesture);
            });

            // Play sound
            if (state.isSoundOn && !isFallback) {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = 880;
                    gain.gain.value = 0.08;
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } catch (e) {}
            }

            // Update stats
            updateStats();

            // Add to history
            state.history.push({ gesture, time: new Date().toLocaleTimeString(), msg: data.msg });

            // Auto streak reset after 10s
            clearTimeout(state.streakTimer);
            state.streakTimer = setTimeout(() => {
                state.loveStreak = 0;
                updateStats();
            }, 10000);
        }

        // ===== 19. CAMERA SETUP =====
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                await video.play();
                return true;
            } catch (err) {
                loveTextEl.innerHTML = `
                    <span class="msg-emoji">📷</span>
                    <span class="msg-text">please allow camera for love</span>
                `;
                gestureBadgeEl.innerHTML = '<span class="g-emoji">⚠️</span> No Camera';
                showToast('📷 Camera access required!');
                return false;
            }
        }

        // ===== 20. GESTURE DETECTION (Enhanced) =====
        function detectGesture(videoElement) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const w = 80, h = 60;
            canvas.width = w;
            canvas.height = h;

            ctx.drawImage(videoElement, 0, 0, w, h);
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;

            // Skin detection
            let r = 0, g = 0, b = 0, count = 0;
            const centerY = Math.floor(h * 0.45);
            const centerX = Math.floor(w * 0.5);

            for (let y = centerY - 10; y < centerY + 10; y++) {
                for (let x = centerX - 14; x < centerX + 14; x++) {
                    const idx = (y * w + x) * 4;
                    r += data[idx];
                    g += data[idx + 1];
                    b += data[idx + 2];
                    count++;
                }
            }
            r /= count;
            g /= count;
            b /= count;

            const isSkin = (r > 80 && g > 40 && b > 30 && r > g && r > b && (r - g) > 15);
            const brightness = (r + g + b) / 3;

            if (!isSkin || brightness < 35) {
                state.accuracy = Math.max(state.accuracy - 1, 0);
                updateStats();
                return 'none';
            }

            // Corner detection
            let cornerSkin = 0;
            const corners = [
                [10, 10],
                [w - 10, 10],
                [10, h - 10],
                [w - 10, h - 10]
            ];
            for (let [cx, cy] of corners) {
                const idx = (cy * w + cx) * 4;
                const r2 = data[idx],
                    g2 = data[idx + 1],
                    b2 = data[idx + 2];
                if (r2 > 70 && g2 > 35 && b2 > 25 && r2 > g2 && r2 > b2) cornerSkin++;
            }

            // ---- GESTURE DETECTORS ----

            // Thumb Up
            let thumbUp = false;
            for (let dy = -4; dy <= 4; dy++) {
                for (let dx = -4; dx <= 4; dx++) {
                    const px = Math.floor(w * 0.75) + dx;
                    const py = Math.floor(h * 0.2) + dy;
                    if (px < 0 || px >= w || py < 0 || py >= h) continue;
                    const idx = (py * w + px) * 4;
                    if (data[idx] > 100 && data[idx + 1] > 40 && data[idx + 2] > 30) { thumbUp = true; break; }
                }
                if (thumbUp) break;
            }

            // Thumb Down
            let thumbDown = false;
            for (let dy = -4; dy <= 4; dy++) {
                for (let dx = -4; dx <= 4; dx++) {
                    const px = Math.floor(w * 0.75) + dx;
                    const py = Math.floor(h * 0.8) + dy;
                    if (px < 0 || px >= w || py < 0 || py >= h) continue;
                    const idx = (py * w + px) * 4;
                    if (data[idx] > 100 && data[idx + 1] > 40 && data[idx + 2] > 30) { thumbDown = true; break; }
                }
                if (thumbDown) break;
            }

            // ILY (pinky + thumb)
            let pinkyCount = 0,
                thumbCount = 0;
            for (let dy = -4; dy <= 4; dy++) {
                for (let dx = -4; dx <= 4; dx++) {
                    const px1 = Math.floor(w * 0.2) + dx;
                    const py1 = Math.floor(h * 0.7) + dy;
                    if (px1 >= 0 && px1 < w && py1 >= 0 && py1 < h) {
                        const idx = (py1 * w + px1) * 4;
                        if (data[idx] > 80 && data[idx + 1] > 30 && data[idx + 2] > 20) pinkyCount++;
                    }
                    const px2 = Math.floor(w * 0.75) + dx;
                    const py2 = Math.floor(h * 0.2) + dy;
                    if (px2 >= 0 && px2 < w && py2 >= 0 && py2 < h) {
                        const idx = (py2 * w + px2) * 4;
                        if (data[idx] > 80 && data[idx + 1] > 30 && data[idx + 2] > 20) thumbCount++;
                    }
                }
            }
            const ilyDetect = (pinkyCount > 20 && thumbCount > 20);

            // Shaka
            let shakaPinky = 0,
                shakaThumb = 0;
            for (let dy = -3; dy <= 3; dy++) {
                for (let dx = -3; dx <= 3; dx++) {
                    const px1 = Math.floor(w * 0.15) + dx;
                    const py1 = Math.floor(h * 0.7) + dy;
                    if (px1 >= 0 && px1 < w && py1 >= 0 && py1 < h) {
                        const idx = (py1 * w + px1) * 4;
                        if (data[idx] > 70 && data[idx + 1] > 30 && data[idx + 2] > 20) shakaPinky++;
                    }
                    const px2 = Math.floor(w * 0.8) + dx;
                    const py2 = Math.floor(h * 0.2) + dy;
                    if (px2 >= 0 && px2 < w && py2 >= 0 && py2 < h) {
                        const idx = (py2 * w + px2) * 4;
                        if (data[idx] > 70 && data[idx + 1] > 30 && data[idx + 2] > 20) shakaThumb++;
                    }
                }
            }
            const shakaDetect = (shakaPinky > 15 && shakaThumb > 15);

            // Peace
            let indexCount = 0,
                middleCount = 0;
            for (let dy = -3; dy <= 3; dy++) {
                for (let dx = -3; dx <= 3; dx++) {
                    const px1 = Math.floor(w * 0.4) + dx;
                    const py1 = Math.floor(h * 0.25) + dy;
                    if (px1 >= 0 && px1 < w && py1 >= 0 && py1 < h) {
                        const idx = (py1 * w + px1) * 4;
                        if (data[idx] > 70 && data[idx + 1] > 30 && data[idx + 2] > 20) indexCount++;
                    }
                    const px2 = Math.floor(w * 0.55) + dx;
                    const py2 = Math.floor(h * 0.25) + dy;
                    if (px2 >= 0 && px2 < w && py2 >= 0 && py2 < h) {
                        const idx = (py2 * w + px2) * 4;
                        if (data[idx] > 70 && data[idx + 1] > 30 && data[idx + 2] > 20) middleCount++;
                    }
                }
            }
            const peaceDetect = (indexCount > 12 && middleCount > 12 && cornerSkin <= 2);

            // Point Up
            let pointUp = false;
            let indexOnly = 0;
            for (let dy = -3; dy <= 3; dy++) {
                for (let dx = -3; dx <= 3; dx++) {
                    const px = Math.floor(w * 0.5) + dx;
                    const py = Math.floor(h * 0.2) + dy;
                    if (px >= 0 && px < w && py >= 0 && py < h) {
                        const idx = (py * w + px) * 4;
                        if (data[idx] > 70 && data[idx + 1] > 30 && data[idx + 2] > 20) indexOnly++;
                    }
                }
            }
            if (indexOnly > 15 && cornerSkin <= 2 && !peaceDetect && !shakaDetect) pointUp = true;

            // Heart (two hands together) - approximate
            let heartDetect = false;
            let leftSkin = 0,
                rightSkin = 0;
            for (let y = 20; y < 50; y++) {
                for (let x = 10; x < 35; x++) {
                    const idx = (y * w + x) * 4;
                    if (data[idx] > 70 && data[idx + 1] > 30 && data[idx + 2] > 20) leftSkin++;
                }
                for (let x = 45; x < 70; x++) {
                    const idx = (y * w + x) * 4;
                    if (data[idx] > 70 && data[idx + 1] > 30 && data[idx + 2] > 20) rightSkin++;
                }
            }
            if (leftSkin > 80 && rightSkin > 80 && cornerSkin >= 2) heartDetect = true;

            // Clap - motion based (simplified)
            let clapDetect = false;
            let brightDiff = 0;
            for (let y = 10; y < 50; y++) {
                for (let x = 10; x < 70; x++) {
                    const idx = (y * w + x) * 4;
                    brightDiff += data[idx] + data[idx + 1] + data[idx + 2];
                }
            }
            brightDiff = brightDiff / (40 * 60);
            if (brightDiff > 150 && cornerSkin >= 3) clapDetect = true;

            // ---- DECISION ----
            if (heartDetect) return 'heart';
            if (ilyDetect) return 'ily';
            if (shakaDetect) return 'shaka';
            if (peaceDetect) return 'peace';
            if (pointUp) return 'pointup';
            if (thumbUp) return 'thumb';
            if (thumbDown) return 'thumbdown';
            if (clapDetect) return 'clap';
            if (cornerSkin >= 3 && brightness > 60) return 'open';
            if (cornerSkin <= 1 && brightness > 40) return 'fist';

            state.accuracy = Math.max(state.accuracy - 0.5, 0);
            updateStats();
            return 'none';
        }

        // ===== 21. MAIN PROCESSING LOOP =====
        function processFrame() {
            if (!video || video.readyState < 2) {
                requestAnimationFrame(processFrame);
                return;
            }

            state.frameSkip = (state.frameSkip + 1) % 3;
            if (state.frameSkip === 0) {
                const gesture = detectGesture(video);
                if (gesture !== 'none' && gesture !== state.lastGesture) {
                    state.lastGesture = gesture;
                    updateLove(gesture);
                } else if (gesture === 'none' && state.lastGesture !== 'none') {
                    state.lastGesture = 'none';
                    // Show random love when no gesture
                    const random = FALLBACK_MSGS[Math.floor(Math.random() * FALLBACK_MSGS.length)];
                    loveTextEl.innerHTML = `
                        <span class="msg-emoji">${random.emoji}</span>
                        <span class="msg-text">${random.msg}</span>
                    `;
                    gestureBadgeEl.innerHTML = `<span class="g-emoji">💕</span><span id="gestureName">Waiting...</span>`;
                    document.querySelectorAll('.gesture-item').forEach(el => el.classList.remove('active'));
                }
            }

            requestAnimationFrame(processFrame);
        }

        // ===== 22. BACKGROUND PARTICLES =====
        function createParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 25; i++) {
                const span = document.createElement('span');
                const size = 10 + Math.random() * 30;
                span.style.width = size + 'px';
                span.style.height = size + 'px';
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDelay = Math.random() * 20 + 's';
                span.style.animationDuration = 15 + Math.random() * 20 + 's';
                span.style.opacity = 0.1 + Math.random() * 0.3;
                container.appendChild(span);
            }
        }

        // ===== 23. INIT =====
        async function init() {
            createParticles();
            const ok = await setupCamera();
            if (ok) {
                setTimeout(() => processFrame(), 400);
                showToast('🫶 Welcome to Love Studio!');
                // Auto quote every 30s
                setInterval(() => {
                    const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
                    if (state.lastGesture === 'none') {
                        loveTextEl.innerHTML = `
                            <span class="msg-emoji">📖</span>
                            <span class="msg-text">${quote}</span>
                        `;
                    }
                }, 30000);
            }
        }

        init();

        // ===== 24. KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 's') captureScreenshot();
            if (e.key === 'r') resetAll();
            if (e.key === 't') toggleTheme();
            if (e.key === 'm') toggleMusic();
        });

        // ===== 25. CONSOLE HELP =====
        console.log('💖 Love Studio Pro loaded!');
        console.log('📌 Shortcuts: s=Screenshot, r=Reset, t=Theme, m=Music');
        console.log('📌 Gestures: 🫶 open, ✊ fist, 🤟 ILY, 👍 thumb, 👎 down, ✌️ peace, 🤙 shaka, 👆 point, ❤️ heart, 👏 clap');
    </script>
</body>
