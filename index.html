<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Realistic Anime Generator</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        canvas {
            background: #f8f9fa; /* Clean white background */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            width: 500px;
            height: 600px;
        }
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(238, 90, 36, 0.6);
        }
        button.secondary {
            background: linear-gradient(45deg, #00b894, #00cec9);
            box-shadow: 0 4px 15px rgba(0, 206, 201, 0.4);
        }
        button.secondary:hover {
            box-shadow: 0 8px 25px rgba(0, 206, 201, 0.6);
        }
    </style>
</head>
<body>

    <h1>✨ 3D-Like Anime Engine</h1>
    <div class="container">
        <canvas id="animeCanvas" width="500" height="600"></canvas>
        
        <div class="controls">
            <button onclick="generateCharacter()">🔄 Generate Masterpiece</button>
            <button class="secondary" onclick="downloadImage()">💾 Download HD PNG</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('animeCanvas');
        const ctx = canvas.getContext('2d');

        // --- 1. ADVANCED COLOR PALETTE WITH SHADOWS ---
        const palettes = [
            { skin: '#f5d0ba', skinShadow: '#e8b595', blush: '#f5a0a0', hair: '#2c3e50', hairLight: '#4b6584', eye: '#3498db', outfit: '#ff7675', outfitShadow: '#d63031' },
            { skin: '#ffe0bd', skinShadow: '#f5cba7', blush: '#ffb3c6', hair: '#e67e22', hairLight: '#f39c12', eye: '#00b894', outfit: '#74b9ff', outfitShadow: '#0984e3' },
            { skin: '#fce4d6', skinShadow: '#edd9c0', blush: '#ffb7b2', hair: '#f1c40f', hairLight: '#f9e79f', eye: '#6c5ce7', outfit: '#fd79a8', outfitShadow: '#e84393' },
            { skin: '#e8b595', skinShadow: '#d39b7c', blush: '#e66767', hair: '#ffffff', hairLight: '#dfe6e9', eye: '#e17055', outfit: '#55efc4', outfitShadow: '#00b894' }
        ];

        let currentChar = {};

        function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // --- 2. DRAWING UTILITIES (Gradients for realism) ---
        function drawGradientEllipse(x, y, rx, ry, color1, color2, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.beginPath();
            ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
            
            let gradient = ctx.createRadialGradient(-rx * 0.3, -ry * 0.3, 0, 0, 0, rx);
            gradient.addColorStop(0, color1);
            gradient.addColorStop(1, color2);
            
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.restore();
        }

        function drawSoftShadow(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        // --- 3. MAIN RENDERING ENGINE ---
        function renderCharacter(palette) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = 250; // Center X
            const headY = 180; // Center Y of Head

            // --- LAYER 1: NECK & COLLARBONE SHADOW ---
            drawGradientEllipse(cx, headY + 80, 45, 30, palette.skin, palette.skinShadow);
            drawGradientEllipse(cx, headY + 95, 35, 15, palette.skin, palette.skinShadow);

            // --- LAYER 2: BODY & CLOTHING (With 3D Folds) ---
            // Shirt
            ctx.fillStyle = palette.outfit;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.ellipse(cx, headY + 220, 120, 140, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Shirt Shadow (Folds)
            ctx.fillStyle = palette.outfitShadow;
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.ellipse(cx - 30, headY + 240, 50, 80, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // --- LAYER 3: HEAD & FACE SHAPE ---
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            drawGradientEllipse(cx, headY, 90, 100, palette.skin, palette.skinShadow);
            
            // Chin highlight
            drawGradientEllipse(cx, headY + 30, 50, 40, '#ffffff', palette.skin);
            ctx.shadowBlur = 0;

            // --- LAYER 4: BLUSH (Cheeks) ---
            drawSoftShadow(cx - 55, headY + 20, 25, 15, palette.blush);
            drawSoftShadow(cx + 55, headY + 20, 25, 15, palette.blush);

            // --- LAYER 5: EYEBROWS ---
            ctx.strokeStyle = palette.hair;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            // Left
            ctx.beginPath();
            ctx.moveTo(cx - 60, headY - 20);
            ctx.quadraticCurveTo(cx - 35, headY - 35, cx - 20, headY - 20);
            ctx.stroke();
            // Right
            ctx.beginPath();
            ctx.moveTo(cx + 60, headY - 20);
            ctx.quadraticCurveTo(cx + 35, headY - 35, cx + 20, headY - 20);
            ctx.stroke();

            // --- LAYER 6: ULTRA REALISTIC EYES (The soul of anime) ---
            const eyeY = headY + 15;
            
            // Eye Whites
            ctx.fillStyle = '#fdfbf7';
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(cx - 30, eyeY, 25, 30, -0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 30, eyeY, 25, 30, 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Iris (With radial gradient for depth)
            for(let eyeX of [cx - 30, cx + 30]) {
                // Outer Ring
                ctx.beginPath();
                let grad = ctx.createRadialGradient(eyeX + 5, eyeY + 5, 0, eyeX, eyeY, 22);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.3, palette.eye);
                grad.addColorStop(1, '#2c3e50'); // Dark rim
                ctx.fillStyle = grad;
                ctx.ellipse(eyeX, eyeY, 20, 20, 0, 0, Math.PI * 2);
                ctx.fill();

                // Pupil
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.ellipse(eyeX, eyeY + 4, 7, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // Specular Highlight 1 (Main Light)
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.ellipse(eyeX - 8, eyeY - 6, 5, 8, -0.3, 0, Math.PI * 2);
                ctx.fill();

                // Specular Highlight 2 (Secondary bounce light)
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.ellipse(eyeX + 5, eyeY + 10, 3, 4, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Eyelashes (Top)
            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 3;
            for(let eyeX of [cx - 30, cx + 30]) {
                for(let i = -10; i <= 10; i+=5) {
                    ctx.beginPath();
                    ctx.moveTo(eyeX + i, eyeY - 28);
                    ctx.lineTo(eyeX + i - 4, eyeY - 35);
                    ctx.stroke();
                }
            }

            // --- LAYER 7: MOUTH & NOSE ---
            // Nose hint
            ctx.fillStyle = palette.skinShadow;
            ctx.beginPath();
            ctx.ellipse(cx - 5, headY + 45, 4, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 5, headY + 45, 4, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Mouth (Soft Gradient)
            ctx.fillStyle = '#e74c3c';
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.ellipse(cx, headY + 60, 18, 9, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = '#c0392b'; // Inner mouth
            ctx.beginPath();
            ctx.ellipse(cx, headY + 63, 12, 5, 0, 0, Math.PI);
            ctx.fill();

            // Lip highlight
            ctx.fillStyle = '#fdfbf7';
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.ellipse(cx - 6, headY + 55, 5, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;

            // --- LAYER 8: HAIR (Complex multi-layered) ---
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            
            // Back hair
            ctx.fillStyle = palette.hairShadow || palette.hair;
            ctx.beginPath();
            ctx.ellipse(cx, headY - 10, 95, 105, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Main Hair
            ctx.fillStyle = palette.hair;
            ctx.beginPath();
            ctx.ellipse(cx, headY - 10, 85, 95, 0, 0, Math.PI * 2);
            ctx.fill();

            // Side Locks (Flowing)
            ctx.beginPath();
            ctx.moveTo(cx - 85, headY - 20);
            ctx.quadraticCurveTo(cx - 120, headY + 20, cx - 100, headY + 80);
            ctx.lineTo(cx - 80, headY + 60);
            ctx.quadraticCurveTo(cx - 90, headY + 10, cx - 60, headY - 10);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(cx + 85, headY - 20);
            ctx.quadraticCurveTo(cx + 120, headY + 20, cx + 100, headY + 80);
            ctx.lineTo(cx + 80, headY + 60);
            ctx.quadraticCurveTo(cx + 90, headY + 10, cx + 60, headY - 10);
            ctx.fill();

            // Bangs (Front)
            ctx.fillStyle = palette.hairLight;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.moveTo(cx - 70, headY - 60);
            ctx.quadraticCurveTo(cx - 20, headY - 80, cx, headY - 50);
            ctx.quadraticCurveTo(cx, headY - 30, cx - 20, headY - 15);
            ctx.quadraticCurveTo(cx - 40, headY - 40, cx - 70, headY - 60);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(cx, headY - 50);
            ctx.quadraticCurveTo(cx + 20, headY - 80, cx + 70, headY - 60);
            ctx.quadraticCurveTo(cx + 40, headY - 40, cx + 20, headY - 15);
            ctx.quadraticCurveTo(cx, headY - 30, cx, headY - 50);
            ctx.fill();

            ctx.shadowBlur = 0;

            // --- LAYER 9: ACCESSORIES (Like the image) ---
            // Choker
            ctx.fillStyle = '#2c3e50';
            ctx.shadowBlur = 10;
            ctx.fillRect(cx - 45, headY + 70, 90, 12);
            
            // Gold Ring on Choker
            ctx.fillStyle = '#f1c40f';
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(241, 196, 15, 0.5)';
            ctx.beginPath();
            ctx.ellipse(cx, headY + 76, 8, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#d4ac0d';
            ctx.beginPath();
            ctx.ellipse(cx, headY + 76, 5, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Belt (Lower)
            ctx.fillStyle = '#2c3e50';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.fillRect(cx - 60, headY + 170, 120, 15);
            
            // Belt Buckle
            ctx.fillStyle = '#f1c40f';
            ctx.shadowBlur = 5;
            ctx.fillRect(cx - 15, headY + 167, 30, 21);
            ctx.fillStyle = '#d4ac0d';
            ctx.fillRect(cx - 5, headY + 172, 10, 11);
            
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';

            // --- LAYER 10: GLOWING EFFECTS ---
            // Add a soft glow around the character
            ctx.shadowBlur = 60;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.1)';
            ctx.fillStyle = 'rgba(255, 255, 255, 0)';
            ctx.beginPath();
            ctx.arc(cx, headY, 150, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // --- 4. GENERATE AND SAVE FUNCTIONS ---
        function generateCharacter() {
            currentChar = getRandom(palettes);
            renderCharacter(currentChar);
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'Anime_Masterpiece.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Initial Render
        generateCharacter();
    </script>
</body>
</html>
