<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Anime Generator</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            background-color: #f4f4f9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 15px;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #ff6b6b;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #ff4757;
            transform: scale(1.05);
        }
        button.secondary {
            background-color: #2ed573;
        }
        button.secondary:hover {
            background-color: #26de81;
        }
    </style>
</head>
<body>

    <h1>✨ Anime Avatar Generator</h1>
    <canvas id="animeCanvas" width="400" height="500"></canvas>
    
    <div class="controls">
        <button onclick="generateCharacter()">Generate New Character</button>
        <button class="secondary" onclick="downloadImage()">Download as PNG</button>
    </div>

    <script>
        const canvas = document.getElementById('animeCanvas');
        const ctx = canvas.getContext('2d');

        // Character Palette (Colors)
        const colors = {
            skin: ['#fce4d6', '#f5d0ba', '#e8b595', '#d39b7c'],
            hair: ['#2c3e50', '#e67e22', '#8e44ad', '#e74c3c', '#f1c40f', '#ffffff', '#34495e', '#a04000'],
            eyes: ['#3498db', '#e74c3c', '#27ae60', '#f39c12', '#8e44ad', '#2c3e50'],
            outfits: ['#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#f1c40f', '#e67e22'],
            accessories: ['#c0392b', '#16a085', '#d35400']
        };

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function drawCharacter() {
            // 1. Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Random Selections
            const skinColor = getRandom(colors.skin);
            const hairColor = getRandom(colors.hair);
            const eyeColor = getRandom(colors.eyes);
            const outfitColor = getRandom(colors.outfits);
            const accessoryColor = getRandom(colors.accessories);
            const hairStyle = Math.floor(Math.random() * 3); // 0, 1, or 2

            // 2. Draw Body & Legs (Base)
            ctx.fillStyle = skinColor;
            ctx.fillRect(170, 240, 60, 120); // Torso
            ctx.fillRect(175, 360, 20, 80);  // Left leg
            ctx.fillRect(205, 360, 20, 80);  // Right leg

            // 3. Draw Outfit (Dress/Shirt)
            ctx.fillStyle = outfitColor;
            ctx.beginPath();
            ctx.moveTo(160, 250);
            ctx.quadraticCurveTo(200, 230, 240, 250);
            ctx.lineTo(230, 320);
            ctx.quadraticCurveTo(200, 330, 170, 320);
            ctx.closePath();
            ctx.fill();
            
            // 4. Draw Head
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.ellipse(200, 140, 55, 65, 0, 0, Math.PI * 2);
            ctx.fill();

            // 5. Draw Hair (Procedural based on random style)
            ctx.fillStyle = hairColor;
            if (hairStyle === 0) { // Long straight hair
                ctx.beginPath();
                ctx.ellipse(200, 130, 70, 80, 0, 0, Math.PI * 2);
                ctx.fill();
                // Bangs
                ctx.fillRect(160, 130, 80, 40);
                // Side locks
                ctx.fillRect(140, 160, 20, 70);
                ctx.fillRect(240, 160, 20, 70);
            } else if (hairStyle === 1) { // Spiky/Short hair
                ctx.beginPath();
                ctx.moveTo(145, 140);
                ctx.lineTo(160, 80);
                ctx.lineTo(185, 115);
                ctx.lineTo(200, 60);
                ctx.lineTo(215, 115);
                ctx.lineTo(240, 80);
                ctx.lineTo(255, 140);
                ctx.closePath();
                ctx.fill();
            } else { // Twin-tails
                ctx.beginPath();
                ctx.ellipse(200, 135, 50, 60, 0, 0, Math.PI * 2);
                ctx.fill();
                // Pigtails
                ctx.beginPath();
                ctx.ellipse(130, 210, 30, 60, 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(270, 210, 30, 60, -0.5, 0, Math.PI * 2);
                ctx.fill();
                // Bangs
                ctx.fillRect(160, 130, 80, 40);
            }

            // 6. Draw Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(170, 150, 15, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(230, 150, 15, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eye Iris
            ctx.fillStyle = eyeColor;
            ctx.beginPath();
            ctx.ellipse(175, 150, 8, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(225, 150, 8, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eye Highlights
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(178, 145, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(228, 145, 3, 0, Math.PI * 2);
            ctx.fill();

            // 7. Draw Mouth (Smile)
            ctx.strokeStyle = '#d35400';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(200, 180, 15, 0, Math.PI);
            ctx.stroke();

            // 8. Draw Accessory (Choker/Belt like the image)
            ctx.fillStyle = accessoryColor;
            ctx.fillRect(165, 180, 70, 10); // Choker
            ctx.fillRect(170, 260, 60, 8);  // Belt

            // Text
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.fillText('CUSTOM AVATAR', 130, 470);
        }

        function generateCharacter() {
            drawCharacter();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'anime_character.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Initial Draw
        generateCharacter();
    </script>
</body>
</html>
